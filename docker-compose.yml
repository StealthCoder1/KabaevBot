version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kabaev-postgres
    restart: always
    environment:
      POSTGRES_DB: kabaevbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kabaevbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: kabaev-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
